server {
    server_name guhongli.top www.guhongli.top;

    # 上传文件大小限制
    client_max_body_size 10M;

    # API代理 - 指向 AI 图书馆后端 3001 端口
    location /api {
        proxy_pass http://localhost:3001; # 已修改为 3001
        proxy_http_version 1.1;
        
        # 取消 Upgrade 强制升级，改为支持长连接
        proxy_set_header Connection ""; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # ⚠️ 关闭缓存和缓冲，确保 AI 助手聊天气泡能“逐字打出” (非常重要)
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
    }

    # 文件访问 (一并帮您改为了 3001)
    location /uploads {
        proxy_pass http://localhost:3001/uploads;
        proxy_set_header Host $host;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/guhongli.top/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/guhongli.top/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.guhongli.top) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = guhongli.top) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name guhongli.top www.guhongli.top;
    return 404; # managed by Certbot
}
